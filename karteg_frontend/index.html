<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Halaman...</title>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #2e7d32;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <p>Memeriksa sesi login, mohon tunggu...</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Skenario Keamanan: Ambil token atau data login dari localStorage/sessionStorage
            // Sesuai dengan yang kamu atur di auth.js sebelumnya
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const role = localStorage.getItem('role') || sessionStorage.getItem('role'); 

            // Proses Redirection Otomatis
            if (!token) {
                // 1. Jika belum login, tendang langsung ke halaman login
                window.location.href = 'pages/login.html';
            } else {
                // 2. Jika sudah login, arahkan berdasarkan role/aksesnya
                if (role === 'admin') {
                    window.location.href = 'pages/dashboard_admin.html';
                } else if (role === 'kasir') {
                    window.location.href = 'pages/dashboard_transaksi_kasir.html';
                } else {
                    // Antisipasi jika role tidak dikenali atau error, bersihkan token dan ke login
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.href = 'pages/login.html';
                }
            }
        });
    </script>
</body>
</html>
